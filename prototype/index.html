<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3f76b3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="栄養計算" />
    <meta name="description" content="経腸栄養・静脈栄養の総カロリーやタンパク量、NPC/Nを計算するツール" />
    <title>栄養計算</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-icon">栄</div>
        <h1>栄養計算</h1>
      </div>
    </header>

    <main class="app-shell">
      <section class="group-panel">
        <div class="section-title">経腸栄養剤 (EN)</div>
        <div class="slot-list" id="enSlots"></div>
        <div class="summary-card-block">
          <h2>経腸栄養剤 (EN) 合計値</h2>
          <div id="enSummary"></div>
        </div>
      </section>

      <section class="group-panel">
        <div class="section-title">静脈栄養剤 (PN)</div>
        <div class="slot-list" id="pnSlots"></div>
        <div class="summary-card-block">
          <h2>静脈栄養剤 (PN) 合計値</h2>
          <div id="pnSummary"></div>
        </div>
      </section>

      <section class="group-panel">
        <div class="section-title">計算結果</div>
        <div class="summary-card-block">
          <h2>経腸栄養 + 静脈栄養 合計値</h2>
          <div id="totalSummary"></div>
        </div>
      </section>

      <section class="group-panel">
        <div class="section-title">体重入力</div>
        <div class="weight-card">
          <label class="field-label" for="bodyWeight">体重 (kg)</label>
          <input id="bodyWeight" type="number" min="0" step="0.1" inputmode="decimal" placeholder="例: 50" />
        </div>
        <div class="summary-card-block">
          <h2>/kg 計算</h2>
          <div id="perKgSummary"></div>
        </div>
      </section>

      <section class="group-panel">
        <div class="section-title">追加計算</div>
        <div class="weight-card">
          <label class="field-label" for="advancedMode">表示項目</label>
          <select id="advancedMode">
            <option value="none">表示しない</option>
            <option value="npcn">NPC/N</option>
            <option value="nitrogen-balance">窒素バランス計算</option>
          </select>
        </div>
        <div id="advancedPanel"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
